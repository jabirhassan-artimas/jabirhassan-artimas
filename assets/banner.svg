<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" height="100%">
  <defs>
    <style type="text/css"><![CDATA[
      .t-name {
        font-family: 'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 52px;
        font-weight: 800;
        letter-spacing: 6px;
        fill: #FFFFFF;
      }
      .t-title {
        font-family: 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 4px;
        fill: #00E5FF;
        text-transform: uppercase;
      }
      .t-tag {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10px;
        fill: #8B5CF6;
        letter-spacing: 1px;
      }
      .t-meta {
        font-family: 'Courier New', Courier, monospace;
        font-size: 8.5px;
        fill: #4A5568;
        letter-spacing: 1.5px;
      }
      .t-meta-val {
        fill: #00E5FF;
      }
      .node-pulse {
        animation: pulse 3s ease-in-out infinite;
      }
      .line-flow {
        stroke-dasharray: 6 4;
        animation: dash 4s linear infinite;
      }
      .scanbar {
        animation: scan 8s linear infinite;
      }
      .glow-ring {
        animation: glow 4s ease-in-out infinite alternate;
      }
      .fade-in {
        animation: fadeIn 1.2s ease-in-out forwards;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; r: 3; }
        50% { opacity: 1; r: 5; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -40; }
      }
      @keyframes scan {
        0% { transform: translateY(-320px); opacity: 0; }
        10% { opacity: 0.06; }
        90% { opacity: 0.06; }
        100% { transform: translateY(320px); opacity: 0; }
      }
      @keyframes glow {
        0% { opacity: 0.15; }
        100% { opacity: 0.45; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
      .blink { animation: blink 1.4s step-start infinite; }
    ]]></style>

    <!-- Backgrounds -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="45%" stop-color="#080D1A"/>
      <stop offset="100%" stop-color="#0C0820"/>
    </linearGradient>

    <!-- Glow gradients -->
    <radialGradient id="glow-cyan" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="75%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Vertical line gradient -->
    <linearGradient id="vert-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="horiz-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="border-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Glow overlays -->
  <rect width="900" height="320" fill="url(#glow-cyan)"/>
  <rect width="900" height="320" fill="url(#glow-purple)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00E5FF" stroke-width="0.5">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="750" y1="0" x2="750" y2="320"/>
  </g>

  <!-- Scanline animation -->
  <rect class="scanbar" x="0" y="0" width="900" height="2" fill="#00E5FF"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#border-top)"/>

  <!-- Bottom border line -->
  <rect x="0" y="318.5" width="900" height="1.5" fill="url(#border-top)"/>

  <!-- Left vertical accent -->
  <rect x="0" y="0" width="1.5" height="320" fill="url(#vert-line)"/>
  <!-- Right vertical accent -->
  <rect x="898.5" y="0" width="1.5" height="320" fill="url(#vert-line)"/>

  <!-- ─── HUD corner brackets ─── -->
  <!-- TL -->
  <path d="M 20 20 L 20 45 M 20 20 L 50 20" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- TR -->
  <path d="M 880 20 L 880 45 M 880 20 L 850 20" stroke="#8B5CF6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- BL -->
  <path d="M 20 300 L 20 275 M 20 300 L 50 300" stroke="#8B5CF6" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- BR -->
  <path d="M 880 300 L 880 275 M 880 300 L 850 300" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- ─── HUD telemetry top-left ─── -->
  <text x="32" y="38" class="t-meta">SYS <tspan class="t-meta-val">ONLINE</tspan></text>
  <text x="32" y="52" class="t-meta">LOC <tspan class="t-meta-val">BD</tspan></text>

  <!-- HUD top-right -->
  <text x="868" y="38" class="t-meta" text-anchor="end">STACK <tspan class="t-meta-val">FULL</tspan></text>
  <text x="868" y="52" class="t-meta" text-anchor="end">MODE <tspan class="t-meta-val">DEV + 3D</tspan></text>

  <!-- ─── Decorative flowing lines ─── -->
  <line x1="100" y1="160" x2="320" y2="160" class="line-flow" stroke="url(#horiz-line)" stroke-width="1" fill="none"/>
  <line x1="580" y1="160" x2="800" y2="160" class="line-flow" stroke="url(#horiz-line)" stroke-width="1" fill="none"/>

  <!-- Central vertical divider -->
  <line x1="450" y1="80" x2="450" y2="240" stroke="#FFFFFF" stroke-width="0.4" opacity="0.06"/>

  <!-- ─── Central diamond node ─── -->
  <polygon points="450,155 455,160 450,165 445,160" fill="#00E5FF" opacity="0.8"/>
  <circle cx="450" cy="160" r="12" fill="none" stroke="#00E5FF" stroke-width="0.8" class="glow-ring"/>

  <!-- Pulsing dots on lines -->
  <circle cx="200" cy="160" r="3" fill="#00E5FF" class="node-pulse"/>
  <circle cx="700" cy="160" r="3" fill="#8B5CF6" class="node-pulse" style="animation-delay:-1.5s"/>

  <!-- ─── MAIN NAME ─── -->
  <text x="450" y="132" class="t-name" text-anchor="middle">JABIR HASSAN</text>

  <!-- Underline bar -->
  <rect x="270" y="140" width="360" height="1" fill="url(#horiz-line)"/>

  <!-- ─── SUBTITLE ─── -->
  <text x="450" y="162" class="t-title" text-anchor="middle">Software Engineer · Full Stack Developer · 3D Artist</text>

  <!-- ─── TAG PILLS ─── -->
  <!-- Laravel pill -->
  <rect x="206" y="180" width="72" height="18" rx="9" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="242" y="193" class="t-tag" text-anchor="middle">Laravel</text>

  <!-- React pill -->
  <rect x="288" y="180" width="66" height="18" rx="9" fill="#00E5FF" fill-opacity="0.12" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="321" y="193" class="t-tag" text-anchor="middle">React</text>

  <!-- Electron pill -->
  <rect x="364" y="180" width="74" height="18" rx="9" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="401" y="193" class="t-tag" text-anchor="middle">Electron</text>

  <!-- Blender pill -->
  <rect x="448" y="180" width="68" height="18" rx="9" fill="#00E5FF" fill-opacity="0.12" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="482" y="193" class="t-tag" text-anchor="middle">Blender</text>

  <!-- Node.js pill -->
  <rect x="526" y="180" width="70" height="18" rx="9" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="561" y="193" class="t-tag" text-anchor="middle">Node.js</text>

  <!-- Desktop pill -->
  <rect x="606" y="180" width="76" height="18" rx="9" fill="#00E5FF" fill-opacity="0.12" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="644" y="193" class="t-tag" text-anchor="middle">Desktop</text>

  <!-- ─── BOTTOM STATUS BAR ─── -->
  <rect x="0" y="295" width="900" height="25" fill="#FFFFFF" fill-opacity="0.018"/>

  <!-- Status indicators -->
  <circle cx="36" cy="308" r="3.5" fill="#00E5FF" opacity="0.9"/>
  <text x="46" y="312" class="t-meta">Available for Opportunities</text>

  <text x="450" y="312" class="t-meta" text-anchor="middle">github.com/jabirhassan-artimas</text>

  <circle cx="860" cy="308" r="3.5" fill="#8B5CF6" opacity="0.9" class="blink"/>
  <text x="850" y="312" class="t-meta" text-anchor="end">Bangladesh</text>
</svg>
