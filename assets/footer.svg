<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 90" width="100%" height="100%">
  <defs>
    <style type="text/css"><![CDATA[
      .w1 { animation: wl 10s linear infinite; }
      .w2 { animation: wr 14s linear infinite; }
      .w3 { animation: wl 18s linear infinite; }
      @keyframes wl {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-450px); }
      }
      @keyframes wr {
        0%   { transform: translateX(-450px); }
        100% { transform: translateX(0); }
      }
    ]]></style>
    <linearGradient id="fc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050811" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050811" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="90" fill="#050811"/>

  <!-- Wave 1 cyan fill -->
  <path class="w1" fill="url(#fc)"
    d="M0,40 C112,10 225,70 337,40 C450,10 562,70 675,40 C787,10 900,70 1012,40
       C1125,10 1237,70 1350,40 L1350,90 L0,90 Z"/>

  <!-- Wave 2 purple fill -->
  <path class="w2" fill="url(#fp)"
    d="M-450,50 C-337,20 -225,80 -112,50 C0,20 112,80 225,50 C337,20 450,80 562,50
       C675,20 787,80 900,50 C1012,20 1125,80 1237,50 L1237,90 L-450,90 Z"/>

  <!-- Wave 3 stroke line -->
  <path class="w3" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.2"
    stroke-dasharray="8 6"
    d="M0,35 C112,5 225,65 337,35 C450,5 562,65 675,35 C787,5 900,65 1012,35
       C1125,5 1237,65 1350,35"/>
</svg>
