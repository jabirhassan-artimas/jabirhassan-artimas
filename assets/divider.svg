<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 15" width="100%" height="100%">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0" />
      <stop offset="15%" stop-color="#00F0FF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#BD00FF" stop-opacity="1" />
      <stop offset="85%" stop-color="#0072FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0072FF" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Main horizontal gradient line -->
  <line x1="50" y1="7.5" x2="750" y2="7.5" stroke="url(#divGrad)" stroke-width="1.5" />
  
  <!-- Central cyberpunk diamond node -->
  <polygon points="395,7.5 400,2 405,7.5 400,13" fill="#00F0FF" />
  <circle cx="385" cy="7.5" r="2" fill="#BD00FF" />
  <circle cx="415" cy="7.5" r="2" fill="#BD00FF" />

  <!-- Side accents -->
  <line x1="200" y1="4.5" x2="220" y2="4.5" stroke="#00F0FF" stroke-width="1" opacity="0.6" />
  <line x1="580" y1="4.5" x2="600" y2="4.5" stroke="#0072FF" stroke-width="1" opacity="0.6" />
  
  <!-- Little tick marks near edges -->
  <line x1="100" y1="5" x2="100" y2="10" stroke="#00F0FF" stroke-width="1.5" opacity="0.7" />
  <line x1="700" y1="5" x2="700" y2="10" stroke="#0072FF" stroke-width="1.5" opacity="0.7" />
</svg>
